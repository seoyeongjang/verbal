<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verbal 정책 페이지</title>
    <style>
      body {
        margin: 0;
        background: #111111;
        color: #f7f7f8;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(680px, calc(100% - 32px));
        margin: 0 auto;
        padding: 64px 0;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 7vw, 56px);
        letter-spacing: 0;
      }

      p {
        color: #b7bbc3;
        line-height: 1.55;
      }

      nav {
        display: grid;
        gap: 12px;
        margin-top: 28px;
      }

      a {
        display: block;
        border: 1px solid #34363a;
        border-radius: 18px;
        padding: 18px;
        background: #1c1c1e;
        color: #f7f7f8;
        text-decoration: none;
        font-weight: 900;
      }

      span {
        display: block;
        margin-top: 6px;
        color: #00a86b;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Verbal</h1>
      <p>스토어 제출과 사용자 안내를 위한 Verbal 공개 정책 페이지입니다.</p>
      <nav>
        <a href="/privacy">
          개인정보처리방침
          <span>Privacy policy</span>
        </a>
        <a href="/terms">
          이용약관
          <span>Terms of service</span>
        </a>
        <a href="/community-guidelines">
          커뮤니티 운영정책
          <span>Community guidelines</span>
        </a>
        <a href="/account/delete">
          계정 삭제 요청
          <span>Account deletion request</span>
        </a>
        <a href="/data-deletion">
          데이터 삭제 정책
          <span>Data deletion policy</span>
        </a>
      </nav>
    </main>
  </body>
</html>
